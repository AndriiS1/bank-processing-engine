services:
  bankprocessingengine:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../Infrastructure/Migrations:/app/migrations_folder
    environment:
      - ConnectionStrings__Default=${CONNECTION_STRING}
    depends_on:
      - postgres
    ports:
      - "8080:8080"
      - "8081:8081"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: